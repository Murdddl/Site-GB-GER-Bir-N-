{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Alle Reviews</title>
</head>
<body>

    <main class="container">

        <h1 class="title">Все отзывы</h1>

        <div class="reviews-list">
            {% for review in reviews %}
            <div class="review-card">
                <div class="review-header">
                    <span class="review-name">{{ review.name }}</span>
                    <span class="review-date">{{ review.date|date:"d.m.Y H:i" }}</span>
                </div>
                <p class="review-text">{{ review.text }}</p>
            </div>
            {% empty %}
            <p class="no-reviews">Es gibt bisher keine Reviews</p>
            {% endfor %}
        </div>

        <div class="reviews-link">
            <a href="{% url 'reviews' %}" class="btn btn-download">← Zurück</a>
        </div>

    </main>

</body>
</html>
