{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>{% block title %}Seite{% endblock %}</title>
</head>

<script>
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
    }

    // Применяем тему при загрузке
    window.addEventListener('DOMContentLoaded', () => {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    });
</script>

<body>

    <nav class="top-nav">
        <div class="container nav-wrapper">
            <a href="{% url 'index' %}" class="logo">Schul-Petition</a>
            <div class="nav-links">
                <a href="{% url 'index' %}">Главная</a>
                <a href="{% url 'faq' %}">FAQ</a>
                <a href="{% url 'reviews' %}">Отзывы</a>
                <a href="{% url 'donate' %}">Поддержать</a>
                <button class="theme-toggle" onclick="toggleTheme()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 10px;">🌙</button>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="murdddl" data-description="Support me on Buy me a coffee!" data-message="" data-color="#1a1a1a" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
    AOS.init({
        duration: 800, // Длительность анимации
        once: true     // Анимация срабатывает один раз при скролле
    });
</script>
</body>
</html>
