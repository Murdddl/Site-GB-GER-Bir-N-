{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Spenden</title>
</head>
<body>
    <main class="container">

        <h1 class="title">Spenden</h1>

        <p class="description">
            Ihre Unterstützung hilft uns, diese Initiative weiterzuführen. 
            Jeder Beitrag macht einen Unterschied.
        </p>

        <div class="file-card">
            <div class="file-info">
                <span class="file-icon">☕</span>
                <div class="file-meta">
                    <span class="file-name">Buy Me a Coffee</span>
                    <span class="file-size">Unterstützen Sie uns</span>
                </div>
            </div>
            <div class="file-actions">
                <a href="https://buymeacoffee.com/murdddl" target="_blank" class="btn btn-download">Spenden →</a>
            </div>
        </div>

        <div class="reviews-link">
            <a href="{% url 'index' %}" class="btn btn-view">← Zurück</a>
        </div>

    </main>
</body>
</html>
