{% extends 'base.html' %}

{% block title %}Hauptseite{% endblock %}

{% block content %}

    <main class="container">

        <h1 class="title">Spenden</h1>

        <p class="description">
            Ihre Unterstützung hilft uns, diese Initiative weiterzuführen. 
            Jeder Beitrag macht einen Unterschied.
        </p>

        <div class="file-card">
            <div class="file-info">
                <span class="file-icon">☕</span>
                <div class="file-meta">
                    <span class="file-name">Buy Me a Coffee</span>
                    <span class="file-size">Unterstützen Sie uns</span>
                </div>
            </div>
            <div class="file-actions">
                <a href="https://buymeacoffee.com/murdddl" target="_blank" class="btn btn-download">Spenden →</a>
            </div>
        </div>

        <div class="reviews-link">
            <a href="{% url 'index' %}" class="btn btn-view">← Zurück</a>
        </div>

    </main>

    <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="murdddl" data-description="Support me on Buy me a coffee!" data-message="" data-color="#1a1a1a" data-position="Right" data-x_margin="18" data-y_margin="18"></script>


{% endblock %}
