{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Login</title>
</head>
<body>
    <main class="container">

        <h1 class="title">Login</h1>

        <div class="review-form-block">
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Benutzername" class="form-control" required>
                <input type="password" name="password" placeholder="Passwort" class="form-control" required>
                {% if form.errors %}
                    <p style="color: red; font-size: 0.85rem;">Falscher Benutzername oder Passwort.</p>
                {% endif %}
                <button type="submit" class="btn btn-download">Einloggen</button>
            </form>
        </div>

    </main>
</body>
</html>
