{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Moderation</title>
</head>
<body>
    <main class="container">

        <h1 class="title">Moderation</h1>

        <div class="reviews-list">
            {% for q in questions %}
            <div class="review-card">
                <div class="review-header">
                    <span class="review-name">{{ q.question }}</span>
                    <span class="review-date">{{ q.date|date:"d.m.Y H:i" }}</span>
                </div>
                <form method="POST" action="{% url 'answer_question' q.id %}">
                    {% csrf_token %}
                    <textarea name="answer" placeholder="Antwort schreiben..." class="form-control" rows="2">{{ q.answer }}</textarea>
                    <div class="file-actions" style="margin-top: 10px;">
                        <button name="action" value="approved" class="btn btn-download">Genehmigen</button>
                        <button name="action" value="rejected" class="btn btn-view">Ablehnen</button>
                    </div>
                </form>
            </div>
            {% empty %}
            <p class="no-reviews">Keine Fragen zur Moderation.</p>
            {% endfor %}
        </div>

        <form method="POST" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-view">Ausloggen</button>
        </form>

    </main>
</body>
</html>
