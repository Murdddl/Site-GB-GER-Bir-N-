{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Reviews</title>
</head>
<body>

    <main class="container">

        <h1 class="title">Reviews</h1>

        <div class="review-form-block">
            <h2 class="review-form-title">Review hinterlassen</h2>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Ihr Name (optional)" class="form-control">
                <textarea name="text" placeholder="Ihre Bewertung" class="form-control" rows="4" oninvalid="this.setCustomValidity('Bitte füllen Sie dieses Feld aus')" oninput="this.setCustomValidity('')" required></textarea>
                <button type="submit" class="btn btn-download">Absenden</button>
            </form>
        </div>

        <div class="reviews-list">
            {% for review in reviews %}
            <div class="review-card">
                <div class="review-header">
                    <span class="review-name">{{ review.name }}</span>
                    <span class="review-date">{{ review.date|date:"d.m.Y H:i" }}</span>
                </div>
                <p class="review-text">{{ review.text }}</p>
            </div>
            {% empty %}
            <p class="no-reviews">Es gibt noch keine Reviews</p>
            {% endfor %}
        </div>

        {% if total_count > 10 %}
    <div class="reviews-link">
        <a href="{% url 'all_reviews' %}" class="btn btn-view">Alle Reviews →</a>
    </div>
        {% endif %}

    </main>

</body>
</html>
